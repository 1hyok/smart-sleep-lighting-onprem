name: Deploy Frontend (S3 + CloudFront)

# 보고서 §5.2.3 CI 3단계: build → s3 sync → CloudFront invalidation
#
# 필요한 GitHub Secrets:
#   VITE_API_BASE_URL    processing 스택의 ApiUrl (예: https://xxx.execute-api.ap-northeast-2.amazonaws.com/dev)
#   AWS_DEPLOY_ROLE_ARN  GitHub OIDC 로 수임할 IAM 역할 ARN (S3 put/list + cloudfront:CreateInvalidation)
#   SITE_BUCKET          frontend.yaml Output SiteBucketName
#   CF_DISTRIBUTION_ID   frontend.yaml Output DistributionId

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write     # AWS OIDC 역할 수임
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (VITE_API_BASE_URL 빌드타임 주입)
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-2

      # 캐시 정책(보고서 §5.2.5)은 S3 객체 Cache-Control 메타데이터로 적용한다.
      # ① 해시 파일명 자산: 1년 immutable  ② index.html: no-cache (먼저 자산, 나중 index.html)
      - name: Sync hashed assets (immutable, index.html 제외)
        run: |
          aws s3 sync dist "s3://${{ secrets.SITE_BUCKET }}" --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude index.html

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp dist/index.html "s3://${{ secrets.SITE_BUCKET }}/index.html" \
            --cache-control "no-cache,must-revalidate" \
            --content-type "text/html"

      # 캐시 정책상 index.html 1건만 무효화하면 충분 (월 1,000 경로 무료)
      - name: Invalidate index.html
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CF_DISTRIBUTION_ID }}" \
            --paths /index.html
